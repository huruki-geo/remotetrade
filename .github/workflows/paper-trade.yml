name: Polymarket Paper Trade

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: polymarket-paper-trade
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore paper state
        uses: actions/cache/restore@v4
        with:
          path: data
          key: paper-state-${{ github.run_id }}
          restore-keys: |
            paper-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run paper tick
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m remotetrade.app --patterns patterns.json --discord --discord-events-only --duration-seconds 210

      - name: Run stock event paper tick
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m remotetrade.app --once --stock-patterns stock_patterns.json --discord --discord-events-only

      - name: Save paper state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: paper-state-${{ github.run_id }}

      - name: Upload paper history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-history-${{ github.run_id }}
          path: data
          retention-days: 14
